<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muneeb Nadeem - Intake Form</title>
    <link rel="stylesheet" href="intake_Style.css" />
  </head>
  <body>
    <header>
      <nav>
        <h1 id="muneeb-nadeem" class="logo">Muneeb Nadeem</h1>
        <button class="menu-toggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html">About</a></li>
          <li><a href="service_page.html">Services</a></li>
          <li><a href="index.html" id="con">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <form id="intakeForm">
        <h1>INTAKE FORM</h1>
        <h2>Help us to serve you better</h2>

        <div class="form-group">
          <label for="client_name">Name</label>
          <input type="text" id="client_name" name="client_name" required />
          <span id="nameError" class="error"></span>
        </div>

        <div class="form-group">
          <label for="client_email">Email</label>
          <input type="email" id="client_email" name="client_email" required />
          <span id="emailError" class="error"></span>
        </div>

        <fieldset>
          <legend>What services are you interested in?</legend>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="web_dev"
              name="services"
              value="Web Development"
            />
            <label for="web_dev">Web Development</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="ui_ux"
              name="services"
              value="UI/UX Design"
            />
            <label for="ui_ux">UI/UX Design</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="ecommerce"
              name="services"
              value="E-commerce Solutions"
            />
            <label for="ecommerce">E-commerce Solutions</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="cms"
              name="services"
              value="Content Management Systems"
            />
            <label for="cms">Content Management Systems</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="responsive"
              name="services"
              value="Responsive Design"
            />
            <label for="responsive">Responsive Design</label>
          </div>
          <span id="servicesError" class="error"></span>
        </fieldset>

        <div class="form-group">
          <label for="budget">What is your project's budget range?</label>
          <select id="budget" name="budget" required>
            <option value="">Select</option>
            <option value="Under $500">Under $500</option>
            <option value="$500 to $1000">$500 to $1000</option>
            <option value="$1000 to $5000">$1000 to $5000</option>
            <option value="$5000 to $10000">$5000 to $10000</option>
            <option value="Above $10000">Above $10000</option>
          </select>
          <span id="budgetError" class="error"></span>
        </div>

        <div class="form-group">
          <label for="timeline">What is the timeline for your project?</label>
          <select id="timeline" name="timeline" required>
            <option value="">Select</option>
            <option value="Less than 1 month">Less than 1 month</option>
            <option value="1 - 3 months">1 - 3 months</option>
            <option value="3 - 6 months">3 - 6 months</option>
            <option value="6 months - 1 year">6 months - 1 year</option>
            <option value="More than 1 year">More than 1 year</option>
          </select>
          <span id="timelineError" class="error"></span>
        </div>

        <fieldset>
          <legend>Which technologies are you planning to use?</legend>
          <div class="checkbox-group">
            <input type="checkbox" id="html" name="technologies" value="HTML" />
            <label for="html">HTML</label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="css" name="technologies" value="CSS" />
            <label for="css">CSS</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="javascript"
              name="technologies"
              value="Javascript"
            />
            <label for="javascript">Javascript</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="react"
              name="technologies"
              value="React"
            />
            <label for="react">React</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="angular"
              name="technologies"
              value="Angular"
            />
            <label for="angular">Angular</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="vue"
              name="technologies"
              value="Vue.js"
            />
            <label for="vue">Vue.js</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="bootstrap"
              name="technologies"
              value="Bootstrap"
            />
            <label for="bootstrap">Bootstrap</label>
          </div>
          <div class="checkbox-group">
            <input
              type="checkbox"
              id="jquery"
              name="technologies"
              value="jQuery"
            />
            <label for="jquery">jQuery</label>
          </div>
          <span id="technologiesError" class="error"></span>
        </fieldset>

        <div class="form-group">
          <label for="target_audience">What is your target audience?</label>
          <textarea
            id="target_audience"
            name="target_audience"
            rows="4"
            required
          ></textarea>
          <span id="targetAudienceError" class="error"></span>
        </div>

        <div class="form-group">
          <label for="additional_comments"
            >Additional questions or comments</label
          >
          <textarea
            id="additional_comments"
            name="additional_comments"
            rows="4"
          ></textarea>
        </div>

        <button type="submit" id="submit">SUBMIT</button>
      </form>
    </main>

    <footer>
      <div class="content">
        <h2 id="muneeb-nadeem-1" class="logo">Muneeb Nadeem</h2>
        <nav class="footer-nav">
          <ul>
            <li><a href="service_page.html">Services</a></li>
            <li><a href="intake_page.html">Complete Intake</a></li>
            <li><a href="index.html">Contact</a></li>
          </ul>
        </nav>
        <div class="social-icons">
          <a
            href="https://linkedin.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="/assets/linkedin-in-brands-solid.svg"
              alt="LinkedIn"
              width="24"
              height="24"
            />
          </a>
          <a
            href="https://github.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="/assets/github-brands-solid.svg"
              alt="GitHub"
              width="24"
              height="24"
            />
          </a>
        </div>
      </div>
      <p>© 2024 Muneeb Nadeem | Frontend Developer</p>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.querySelector(".menu-toggle");
        const navMenu = document.querySelector(".nav-menu");

        menuToggle.addEventListener("click", function () {
          navMenu.classList.toggle("active");
          menuToggle.classList.toggle("active");
        });

        // Close menu when clicking outside
        document.addEventListener("click", function (event) {
          const isClickInsideMenu = navMenu.contains(event.target);
          const isClickOnToggle = menuToggle.contains(event.target);

          if (
            !isClickInsideMenu &&
            !isClickOnToggle &&
            navMenu.classList.contains("active")
          ) {
            navMenu.classList.remove("active");
            menuToggle.classList.remove("active");
          }
        });
      });

      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("intakeForm");
        const submitButton = document.getElementById("submit");

        submitButton.addEventListener("click", function (event) {
          event.preventDefault();
          if (validateForm()) {
            alert("Form submitted successfully!");
            form.reset();
          }
        });

        function validateForm() {
          let isValid = true;

          // Validate name
          const name = document.getElementById("client_name");
          const nameError = document.getElementById("nameError");
          if (name.value.trim() === "") {
            nameError.textContent = "Name is required";
            isValid = false;
          } else {
            nameError.textContent = "";
          }

          // Validate email
          const email = document.getElementById("client_email");
          const emailError = document.getElementById("emailError");
          if (email.value.trim() === "") {
            emailError.textContent = "Email is required";
            isValid = false;
          } else if (!/\S+@\S+\.\S+/.test(email.value)) {
            emailError.textContent = "Please enter a valid email address";
            isValid = false;
          } else {
            emailError.textContent = "";
          }

          // Validate services
          const services = document.getElementsByName("services");
          const servicesError = document.getElementById("servicesError");
          if (![...services].some((service) => service.checked)) {
            servicesError.textContent = "Please select at least one service";
            isValid = false;
          } else {
            servicesError.textContent = "";
          }

          // Validate budget
          const budget = document.getElementById("budget");
          const budgetError = document.getElementById("budgetError");
          if (budget.value === "") {
            budgetError.textContent = "Please select a budget range";
            isValid = false;
          } else {
            budgetError.textContent = "";
          }

          // Validate timeline
          const timeline = document.getElementById("timeline");
          const timelineError = document.getElementById("timelineError");
          if (timeline.value === "") {
            timelineError.textContent = "Please select a timeline";
            isValid = false;
          } else {
            timelineError.textContent = "";
          }

          // Validate technologies
          const technologies = document.getElementsByName("technologies");
          const technologiesError =
            document.getElementById("technologiesError");
          if (![...technologies].some((tech) => tech.checked)) {
            technologiesError.textContent =
              "Please select at least one technology";
            isValid = false;
          } else {
            technologiesError.textContent = "";
          }

          // Validate target audience
          const targetAudience = document.getElementById("target_audience");
          const targetAudienceError = document.getElementById(
            "targetAudienceError"
          );
          if (targetAudience.value.trim() === "") {
            targetAudienceError.textContent =
              "Please describe your target audience";
            isValid = false;
          } else {
            targetAudienceError.textContent = "";
          }

          return isValid;
        }
      });
    </script>
  </body>
</html>
